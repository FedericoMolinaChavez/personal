# Supabase local configuration for the `personal` portfolio repo.
# Shared instance for the three agriculture tools (agronomy / spray / fields).
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "personal"

[api]
enabled = true
port = 54321
# Expose the per-tool schemas (plus the defaults) to PostgREST so they are
# reachable through the typed Supabase client, not only via direct SQL.
schemas = ["public", "graphql_public", "agronomy", "spray", "fields"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
# Match Supabase's hosted Postgres major version.
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1:54321"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[analytics]
enabled = false
